name: FQEncoder
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.fqencoder

targets:
  FQEncoder:
    type: application
    platform: macOS
    sources:
      - FQEncoder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.fqencoder.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Menu-bar resident app: no Dock icon, lives in the status bar.
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
